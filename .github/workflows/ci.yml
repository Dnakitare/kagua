name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q

  demo-must-fail:
    # the README demo has to keep failing for the right reason
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install .
      - name: kagua check must exit 1 on the workorder fixture
        run: |
          set +e
          kagua check fixtures/workorder/ --color never | tee /tmp/out.txt
          rc=$?
          set -e
          test "$rc" -eq 1
          grep -q "Composition / forbidden_composition" /tmp/out.txt
